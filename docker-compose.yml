services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: afcen
      POSTGRES_USER: afcen
      POSTGRES_PASSWORD: afcen_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afcen"]
      interval: 5s
      timeout: 3s
      retries: 5

  sidecar:
    build:
      context: ./python-sidecar
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://afcen:afcen_dev@db:5432/afcen
      AFCEN_DEPLOYMENT: production
      OLLAMA_HOST: http://ollama:11434
      PYTHON_SIDECAR_URL: http://sidecar:8000
    depends_on:
      db:
        condition: service_healthy
      sidecar:
        condition: service_healthy

volumes:
  pgdata:
  ollama_models:
